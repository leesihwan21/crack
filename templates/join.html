{% extends 'layout.html' %}
{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">회원가입</h3>
                        <form action="/join" method="POST" id="join-form">
                            <div class="mb-3">
                                <label class="form-label">아이디</label>
                                <div class="input-group">
                                    <input type="text" name="uid" id="uid" class="form-control" placeholder="아이디 입력" required>
                                    <button class="btn btn-outline-secondary" type="button" id="check-id-btn">중복 확인</button>
                                </div>
                                <div id="id-check-msg" class="form-text"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">비밀번호</label>
                                <input type="password" name="password" id="password" class="form-control" placeholder="비밀번호 입력" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">비밀번호 재확인</label>
                                <input type="password" name="password_check" id="password_check" class="form-control" placeholder="비밀번호 다시 입력" required>
                                <div id="pw-match-msg" class="form-text"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">이름</label>
                                <input type="text" name="name" class="form-control" placeholder="실명 입력" required>
                            </div>

                            <button type="submit" id="submit-btn" class="btn btn-success w-100">가입하기</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="/login" class="text-decoration-none">이미 계정이 있으신가요? 로그인</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isIdChecked = false;

        // [추가] 비밀번호 실시간 일치 확인 로직
        const pwInput = document.getElementById('password');
        const pwCheckInput = document.getElementById('password_check');
        const pwMsg = document.getElementById('pw-match-msg');

        function checkPasswordMatch() {
            if (!pwCheckInput.value) {
                pwMsg.innerText = "";
                return;
            }
            if (pwInput.value === pwCheckInput.value) {
                pwMsg.innerText = "✅ 비밀번호가 일치합니다.";
                pwMsg.style.color = "green";
            } else {
                pwMsg.innerText = "❌ 비밀번호가 일치하지 않습니다.";
                pwMsg.style.color = "red";
            }
        }

        pwInput.addEventListener('input', checkPasswordMatch);
        pwCheckInput.addEventListener('input', checkPasswordMatch);

        // 중복 확인 버튼 클릭 시
        document.getElementById('check-id-btn').addEventListener('click', function() {
            const uid = document.getElementById('uid').value;
            const msgElement = document.getElementById('id-check-msg');

            if (!uid.trim()) {
                alert("아이디를 입력해주세요.");
                return;
            }

            fetch('/check_id', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 'uid': uid })
            })
            .then(response => response.json())
            .then(data => {
                if (data.available) {
                    msgElement.innerText = "사용 가능한 아이디입니다.";
                    msgElement.style.color = "green";
                    isIdChecked = true;
                } else {
                    msgElement.innerText = "이미 존재하는 아이디입니다.";
                    msgElement.style.color = "red";
                    isIdChecked = false;
                }
            })
            .catch(err => {
                alert("서버 통신 중 오류가 발생했습니다.");
            });
        });

        document.getElementById('uid').addEventListener('input', function() {
            isIdChecked = false;
            document.getElementById('id-check-msg').innerText = "";
        });

        // 폼 제출 시 최종 방어 로직
        document.getElementById('join-form').addEventListener('submit', function(e) {
            // 1. 중복 확인 체크
            if (!isIdChecked) {
                e.preventDefault();
                alert("아이디 중복 확인을 먼저 완료해주세요.");
                return;
            }
            // 2. 비밀번호 일치 체크 (최종)
            if (pwInput.value !== pwCheckInput.value) {
                e.preventDefault();
                alert("비밀번호 재확인이 일치하지 않습니다.");
                pwCheckInput.focus();
            }
        });
    </script>
{% endblock %}

{% extends 'layout.html' %}
{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-2">🔒 비밀번호 재설정</h3>
                        <p class="text-center text-muted small mb-4">
                            가입 시 등록한 아이디와 이름을 입력해주세요.
                        </p>

                        <form action="/find/password" method="POST">

                            <!-- 아이디 -->
                            <div class="mb-3">
                                <label class="form-label">아이디</label>
                                <input type="text" name="uid" class="form-control"
                                       placeholder="아이디를 입력해주세요" required>
                            </div>

                            <!-- 이름 -->
                            <div class="mb-3">
                                <label class="form-label">이름</label>
                                <input type="text" name="name" class="form-control"
                                       placeholder="가입 시 등록한 이름을 입력해주세요" required>
                            </div>

                            <hr class="my-3">

                            <!-- 새 비밀번호 -->
                            <div class="mb-3">
                                <label class="form-label">새 비밀번호</label>
                                <input type="password" name="new_password" class="form-control"
                                       placeholder="새 비밀번호를 입력해주세요" required>
                            </div>

                            <!-- 새 비밀번호 확인 -->
                            <div class="mb-4">
                                <label class="form-label">새 비밀번호 확인</label>
                                <input type="password" name="new_password_check" class="form-control"
                                       placeholder="새 비밀번호를 다시 입력해주세요" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">비밀번호 재설정</button>

                        </form>

                        <div class="mt-3 text-center">
                            <a href="/login" class="text-decoration-none text-muted small">
                                ← 로그인으로 돌아가기
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

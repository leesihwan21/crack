<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보 수정 - ITS-Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white text-center py-3">
                    <h5 class="mb-0">내 정보 수정</h5>
                </div>
                <div class="card-body p-4">
                    <form action="/update" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted small">아이디</label>
                            <input type="text" class="form-control bg-light" value="{{ user.uid }}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">이름</label>
                            <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">변경할 비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="새 비밀번호 입력" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">수정 내용 저장</button>
                            <button type="button" class="btn btn-light" onclick="history.back()">취소</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="small text-muted mb-2">관리자 기능: 최근 제보 상태 변경</p>
                        <button type="button" class="btn btn-outline-success w-100" onclick="testStatusUpdate()">
                            모든 '검토중' 제보를 '완료'로 변경
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function testStatusUpdate() {
    if (!confirm("정말로 모든 '검토중' 상태를 '완료'로 바꾸시겠습니까?")) return;

    // report_id를 1로 가정하거나, 서버에서 전달받은 특정 ID를 넣어야 합니다.
    // 여기서는 테스트를 위해 ID 1번을 예시로 보냅니다.
    fetch('/update_report_status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: 1, status: '완료' })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("상태가 성공적으로 변경되었습니다!");
            location.reload(); // 변경 확인을 위해 새로고침
        } else {
            alert("오류: " + data.message);
        }
    })
    .catch(err => console.error("Error:", err));
}
</script>
</body>
</html>

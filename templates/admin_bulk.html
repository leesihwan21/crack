<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제보 일괄 처리 - ITS-Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .table-hover tbody tr:hover { background-color: #f0f4ff; cursor: pointer; }
        .selected-row { background-color: #dbeafe !important; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- 헤더 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>⚡ 제보 일괄 처리</h4>
        <a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm">← 관리자 홈</a>
    </div>

    <!-- 일괄 처리 버튼 -->
    <div class="card shadow-sm mb-3">
        <div class="card-body d-flex align-items-center gap-3 flex-wrap">
            <span class="fw-bold">선택된 항목:
                <span id="selected-count" class="text-primary">0</span>건
            </span>
            <button class="btn btn-success btn-sm" onclick="bulkUpdate('처리완료')">✅ 선택 항목 완료 처리</button>
            <button class="btn btn-danger btn-sm" onclick="bulkUpdate('반려')">❌ 선택 항목 반려 처리</button>
            <button class="btn btn-outline-secondary btn-sm ms-auto" onclick="toggleAll()">전체 선택/해제</button>
        </div>
    </div>

    <!-- 제보 목록 테이블 -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h6 class="mb-0">📋 검토중인 제보 목록</h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width:40px">
                            <input type="checkbox" id="check-all" onchange="toggleAll()">
                        </th>
                        <th>ID</th>
                        <th>주소</th>
                        <th>파손 유형</th>
                        <th>상태</th>
                        <th>제보자</th>
                        <th>날짜</th>
                    </tr>
                </thead>
                <tbody id="report-tbody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">데이터 로딩 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    var reportData = [];

    // 제보 목록 불러오기
    fetch('/api/map/potholes')
        .then(res => res.json())
        .then(result => {
            if (!result.success) return;

            // 검토중인 것만 필터링
            reportData = result.data.filter(d => d.status === '검토중');

            var tbody = document.getElementById('report-tbody');

            if (reportData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">검토중인 제보가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = reportData.map(item => `
                <tr id="row-${item.id}" onclick="toggleRow(${item.id})">
                    <td onclick="event.stopPropagation()">
                        <input type="checkbox" class="row-check" value="${item.id}"
                               onchange="updateCount()">
                    </td>
                    <td>${item.id}</td>
                    <td>${item.address}</td>
                    <td><span class="badge bg-info text-dark">${item.severity}</span></td>
                    <td><span class="text-warning">● ${item.status}</span></td>
                    <td>-</td>
                    <td>${item.date}</td>
                </tr>
            `).join('');
        })
        .catch(err => console.error('데이터 로딩 실패:', err));

    // 행 클릭 시 체크박스 토글
    function toggleRow(id) {
        var checkbox = document.querySelector(`#row-${id} .row-check`);
        checkbox.checked = !checkbox.checked;
        updateCount();
        document.getElementById(`row-${id}`).classList.toggle('selected-row', checkbox.checked);
    }

    // 선택된 건수 업데이트
    function updateCount() {
        var checked = document.querySelectorAll('.row-check:checked').length;
        document.getElementById('selected-count').innerText = checked;

        // 행 하이라이트
        document.querySelectorAll('.row-check').forEach(cb => {
            var row = cb.closest('tr');
            row.classList.toggle('selected-row', cb.checked);
        });
    }

    // 전체 선택/해제
    function toggleAll() {
        var checkAll = document.getElementById('check-all');
        var checkboxes = document.querySelectorAll('.row-check');
        checkboxes.forEach(cb => cb.checked = checkAll.checked);
        updateCount();
    }

    // 일괄 처리
    function bulkUpdate(status) {
        var checked = document.querySelectorAll('.row-check:checked');
        if (checked.length === 0) {
            alert('처리할 항목을 선택해주세요.');
            return;
        }

        var ids = Array.from(checked).map(cb => parseInt(cb.value));
        var label = status === '처리완료' ? '완료' : '반려';

        if (!confirm(`선택한 ${ids.length}건을 ${label} 처리하시겠습니까?`)) return;

        fetch('/api/admin/bulk_update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: ids, status: status })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert(`✅ ${data.updated}건이 ${label} 처리되었습니다!`);
                location.reload();
            } else {
                alert('실패: ' + data.message);
            }
        })
        .catch(err => alert('서버 통신 에러가 발생했습니다.'));
    }
</script>

</body>
</html>

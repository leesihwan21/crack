{% extends 'layout.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4"><i class="fas fa-history me-2"></i>RoadEye 분석 이력</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>탐지 일시</th>
                        <th>결함 유형</th>
                        <th>신뢰도(Confidence)</th>
                        <th>처리 상태</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.id }}</td>
                        <td>{{ log.date }}</td>
                        <td><span class="badge {% if log.type == 'Sinkhole' %}bg-danger{% else %}bg-warning text-dark{% endif %}">{{ log.type }}</span></td>
                        <td>{{ (log.conf * 100) | round(1) }}%</td>
                        <td><span class="badge bg-secondary">{{ log.status }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제보 현황 지도 - ITS-Guard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f2b7565033531bba4528b5c87e33fa8d"></script>
    <style>
        #map { width: 100%; height: 600px; border-radius: 8px; }
        .legend-box { background: white; padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>🗺️ 도로 파손 제보 현황 지도</h4>
        <a href="/mypage" class="btn btn-outline-secondary btn-sm">← 마이페이지로</a>
    </div>

    <!-- 필터 버튼 -->
    <div class="mb-3 d-flex gap-2">
        <button class="btn btn-sm btn-warning" onclick="filterMarkers('검토중')">● 검토중</button>
        <button class="btn btn-sm btn-success" onclick="filterMarkers('완료')">● 완료</button>
        <button class="btn btn-sm btn-secondary" onclick="filterMarkers('전체')">전체 보기</button>
    </div>

    <!-- 지도 -->
    <div id="map"></div>

    <!-- 범례 -->
    <div class="mt-3 legend-box d-inline-block">
        <strong>범례</strong>
        <div class="legend-item mt-2">
            <span class="legend-dot" style="background:#FFC107"></span> 검토중
        </div>
        <div class="legend-item">
            <span class="legend-dot" style="background:#198754"></span> 완료/처리완료
        </div>
        <div class="legend-item">
            <span class="legend-dot" style="background:#DC3545"></span> 반려
        </div>
    </div>

    <!-- 제보 통계 -->
    <div class="row mt-4" id="stats-row">
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">전체 제보</h6>
                    <h3 class="text-primary" id="total-count">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">검토중</h6>
                    <h3 class="text-warning" id="pending-count">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">처리완료</h6>
                    <h3 class="text-success" id="done-count">-</h3>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 카카오맵 초기화 (안성 기본값)
    var mapContainer = document.getElementById('map');
    var mapOption = {
        center: new kakao.maps.LatLng(37.283, 127.045),
        level: 7
    };
    var map = new kakao.maps.Map(mapContainer, mapOption);

    // 마커 전체 저장용
    var allMarkers = [];
    var allData = [];

    // 상태별 마커 색상
    function getMarkerColor(status) {
        if (status === '검토중') return 'orange';
        if (status === '완료' || status === '처리완료') return 'green';
        return 'red';
    }

    // 마커 이미지 생성
    function createMarkerImage(color) {
        var colors = {
            'orange': 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
            'green': 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
            'red': 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png'
        };
        return new kakao.maps.MarkerImage(
            colors[color],
            new kakao.maps.Size(24, 35)
        );
    }

    // API에서 제보 데이터 가져오기
    fetch('/api/map/potholes')
        .then(res => res.json())
        .then(result => {
            if (!result.success) return;

            allData = result.data;

            // 통계 업데이트
            var pending = allData.filter(d => d.status === '검토중').length;
            var done = allData.filter(d => d.status === '완료' || d.status === '처리완료').length;
            document.getElementById('total-count').innerText = allData.length;
            document.getElementById('pending-count').innerText = pending;
            document.getElementById('done-count').innerText = done;

            // 마커 생성
            allData.forEach(function(item) {
                var position = new kakao.maps.LatLng(item.lat, item.lng);
                var color = getMarkerColor(item.status);

                var marker = new kakao.maps.Marker({
                    map: map,
                    position: position
                });

                // 인포윈도우 (마커 클릭 시 팝업)
                var infoContent = `
                    <div style="padding:10px; min-width:180px; font-size:0.85rem;">
                        <strong>📍 ${item.address}</strong><br>
                        🚧 파손 유형: ${item.severity}<br>
                        📋 상태: ${item.status}<br>
                        📅 날짜: ${item.date}
                    </div>
                `;
                var infowindow = new kakao.maps.InfoWindow({ content: infoContent });

                kakao.maps.event.addListener(marker, 'click', function() {
                    infowindow.open(map, marker);
                });

                allMarkers.push({ marker: marker, status: item.status });
            });

            // 전체 마커가 보이도록 지도 범위 조정
            if (allData.length > 0) {
                var bounds = new kakao.maps.LatLngBounds();
                allData.forEach(function(item) {
                    bounds.extend(new kakao.maps.LatLng(item.lat, item.lng));
                });
                map.setBounds(bounds);
            }
        })
        .catch(err => console.error('데이터 로딩 실패:', err));

    // 필터 기능
    function filterMarkers(status) {
        allMarkers.forEach(function(item) {
            if (status === '전체') {
                item.marker.setMap(map);
            } else if (status === '완료') {
                if (item.status === '완료' || item.status === '처리완료') {
                    item.marker.setMap(map);
                } else {
                    item.marker.setMap(null);
                }
            } else {
                if (item.status === status) {
                    item.marker.setMap(map);
                } else {
                    item.marker.setMap(null);
                }
            }
        });
    }
</script>

</body>
</html>
